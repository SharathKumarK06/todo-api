services:
  postgres:
    image: postgres:latest
    container_name: todo-postgres
    restart: always

    environment:
      POSTGRES_USER: todo
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: todo_db

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql

  todo-api:
    build: .
    container_name: todo-api
    restart: always

    env_file:
      - ./.env

    ports:
      - "8080:8080"

    depends_on:
      - postgres

volumes:
  postgres_data:
